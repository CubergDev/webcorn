services:
  webcorn:
    build:
      context: .
    ports:
      - "${HOST_PORT:-8080}:8080"
    environment:
      PORT: 8080
      WEBFACTORY_STAFF_EMAIL: ${WEBFACTORY_STAFF_EMAIL:-}
      WEBFACTORY_STAFF_PASSWORD: ${WEBFACTORY_STAFF_PASSWORD:-}
      WEBFACTORY_STAFF_NAME: ${WEBFACTORY_STAFF_NAME:-Команда webcorn}
      CLOUDPAYMENTS_PUBLIC_ID: ${CLOUDPAYMENTS_PUBLIC_ID:-}
      CLOUDPAYMENTS_API_SECRET: ${CLOUDPAYMENTS_API_SECRET:-}
    volumes:
      - webcorn-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  webcorn-data:
